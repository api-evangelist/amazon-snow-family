aid: amazon-snow-family
name: Amazon Snow Family
description: >-
  AWS Snow Family is a collection of physical devices and capacity points that
  help customers with data transfers in and out of AWS when network capacity is
  limited or unavailable. It includes Snowcone, Snowball, and Snowmobile
  devices for edge computing and offline data migration.
